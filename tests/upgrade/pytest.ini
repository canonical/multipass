[pytest]
# The upgrade suite is its own entry point with its own rootdir. Select the
# phase by marker: `pytest tests/upgrade -m seed`, then `-m verify`. It reuses
# the cli framework via `pytest_plugins` in conftest.py.
filterwarnings =
    ignore:.*multi-threaded.*forkpty.*:DeprecationWarning
markers =
    seed: Seed phase -- provision VMs on the currently installed version.
    verify: Verify phase -- validate the seeded VMs after the package upgrade.
    purge: Purge the named instance(s) when the test finishes, e.g. @pytest.mark.purge("upg-foo").
    snapshot: Snapshot test -- auto-skipped by the cli framework on drivers without snapshot support.
