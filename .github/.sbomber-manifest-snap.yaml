    name: multipass-amd64
    arch: amd64

  - <<: *multipass
    name: multipass-arm64
    arch: arm64

  - <<: *multipass
    name: multipass-s390x
    channel: edge
    arch: s390x

  - <<: *multipass
    name: multipass-ppc64el
    channel: edge
    arch: ppc64el
