    service_url: https://sbom-request.canonical.com
    department: devex
    email: __EMAIL__
    team: Multipass
  secscan: {}

.:
  - &multipass
    type: snap
    channel: latest/stable
    ssdlc_params:
      name: multipass
      version: ""
      channel: latest/stable

artifacts:
