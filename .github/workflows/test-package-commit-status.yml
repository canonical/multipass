name: Test package commit status

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  statuses: write

jobs:
  publish-package-link-status:
    name: Publish package link status
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Post package link status
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api \
            --method POST \
            "/repos/${{ github.repository }}/statuses/$HEAD_SHA" \
            -f state=success \
            -f context="Package / Test link" \
            -f description="Open Details to view the package" \
            -f target_url="https://github.com/canonical/multipass/packages"
